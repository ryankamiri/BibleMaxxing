name: biblemaxxing

services:
  biblemaxxing-api:
    image: ${BIBLEMAXXING_API_IMAGE:-biblemaxxing-api:local}
    build:
      context: ${BIBLEMAXXING_BACKEND_CONTEXT:-./backend}
      dockerfile: ${BIBLEMAXXING_BACKEND_DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    env_file:
      - ${BIBLEMAXXING_ENV_FILE:-./.env}
    environment:
      BIBLEMAXXING_ENV: production
      BIBLEMAXXING_DATABASE_URL: ${BIBLEMAXXING_DATABASE_URL}
      BIBLEMAXXING_YOUTUBE_API_KEY: ${BIBLEMAXXING_YOUTUBE_API_KEY}
      BIBLEMAXXING_SECRET_KEY: ${BIBLEMAXXING_SECRET_KEY}
      BIBLEMAXXING_AUTO_CREATE_TABLES: "false"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/biblemaxxing/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:${BIBLEMAXXING_HOST_PORT:-8017}:8000"
    networks:
      biblemaxxing-internal:
      tailortom-caddy:
        aliases:
          - biblemaxxing-api
    command:
      - sh
      - -c
      - "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biblemaxxing}
      POSTGRES_USER: ${POSTGRES_USER:-biblemaxxing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - biblemaxxing-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biblemaxxing} -d ${POSTGRES_DB:-biblemaxxing}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - biblemaxxing-internal

volumes:
  biblemaxxing-postgres-data:

networks:
  biblemaxxing-internal:
    internal: true
  tailortom-caddy:
    external: true
    name: ${TAILORTOM_CADDY_NETWORK:?set TAILORTOM_CADDY_NETWORK to the network used by TailorTom Caddy}
